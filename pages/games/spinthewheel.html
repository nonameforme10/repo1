<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin the Wheel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0f172a;
  --surface:   #1f2937;
  --surface2:  #111827;
  --border:    rgba(255,255,255,0.06);
  --border2:   rgba(255,255,255,0.1);
  --text:      #f3f4f6;
  --text-muted:#9ca3af;
  --accent:    #fbbf24;
  --accent-dim:rgba(251,191,36,0.15);
  --accent-border:rgba(251,191,36,0.3);
  --danger:    rgba(239,68,68,0.7);
  --radius:    12px;
  --radius-lg: 16px;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  overflow-x: hidden;
}

/* ── PAGE LAYOUT ───────────────────────────────────────────── */
.page {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
}

/* ── HEADER ────────────────────────────────────────────────── */
.header {
  border-bottom: 1px solid var(--border);
  padding: 20px 5%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  background: var(--surface2);
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
  white-space: nowrap;
}
.back-link:hover {
  color: var(--text);
  background: rgba(255,255,255,0.05);
  border-color: var(--border2);
  transform: translateY(-1px);
}
.back-link:focus-visible { outline: 2px solid var(--accent-border); outline-offset: 2px; }
.header-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text);
  flex: 1;
  text-align: center;
}
.header-title span { color: var(--accent); }
.header-meta {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 12px;
  color: var(--text-muted);
  justify-content: flex-end;
}
.header-stat { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.header-stat strong { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; }
.mute-btn {
  background: none; border: 1px solid var(--border2); border-radius: 8px;
  color: var(--text-muted); width: 34px; height: 34px; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s, color 0.2s;
}
.mute-btn:hover { border-color: var(--border2); color: var(--text); }

/* ── MAIN ──────────────────────────────────────────────────── */
.main {
  padding: 40px 5%;
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 32px;
  max-width: 1100px;
  width: 100%;
  margin: 0 auto;
  align-items: start;
}

/* ── WHEEL COLUMN ──────────────────────────────────────────── */
.wheel-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}

.wheel-stage {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Thin accent ring */
.wheel-ring {
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  pointer-events: none;
}
.wheel-ring-inner {
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1px solid var(--accent-border);
  pointer-events: none;
}

#wheel-canvas {
  display: block;
  border-radius: 50%;
  position: relative;
  z-index: 2;
  cursor: pointer;
}

/* Pointer — clean downward triangle */
.pointer {
  position: absolute;
  top: -22px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  width: 0; height: 0;
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-top: 22px solid var(--accent);
  filter: drop-shadow(0 2px 6px rgba(251,191,36,0.45));
}

/* Hub */
.hub {
  position: absolute;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid var(--border2);
  z-index: 5;
}

/* Empty state */
.empty-state {
  display: none;
  text-align: center;
  padding: 28px 20px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  max-width: 360px;
  width: 100%;
}
.empty-state.show { display: block; }
.empty-state-icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.6; }
.empty-state h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.empty-state p { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.6; }
.btn-reset {
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  padding: 9px 22px; border-radius: 8px; border: none; cursor: pointer;
  background: var(--accent); color: #111827; transition: background 0.2s, transform 0.15s;
}
.btn-reset:hover { background: #f59e0b; transform: translateY(-1px); }

/* Spin button */
.btn-spin {
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 13px 56px; border: none; border-radius: 10px; cursor: pointer;
  background: var(--accent); color: #111827;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 14px rgba(251,191,36,0.25);
  min-width: 180px;
  position: relative; overflow: hidden;
}
.btn-spin:hover { background: #f59e0b; transform: translateY(-2px); box-shadow: 0 8px 22px rgba(251,191,36,0.35); }
.btn-spin:active { transform: translateY(0); }
.btn-spin:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-spin .key-hint {
  display: block; font-size: 10px; font-weight: 400; letter-spacing: 0.05em;
  opacity: 0.55; margin-top: 3px; text-transform: none;
}
.ripple-span {
  position: absolute; border-radius: 50%; background: rgba(0,0,0,0.15);
  transform: scale(0); animation: ripple-anim 0.5s linear; pointer-events: none;
}
@keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

/* ── SIDE COLUMN ───────────────────────────────────────────── */
.side-col { display: flex; flex-direction: column; gap: 16px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.card-title {
  font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-muted);
  display: flex; align-items: center; gap: 8px;
}
.badge {
  background: rgba(255,255,255,0.07); border: 1px solid var(--border2);
  border-radius: 20px; padding: 1px 8px; font-size: 11px;
  font-weight: 600; color: var(--text-muted); line-height: 1.7;
}

/* Winners list */
.winners-list {
  display: flex; flex-direction: column; gap: 6px;
  max-height: 260px; overflow-y: auto; padding-right: 2px;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.winners-list::-webkit-scrollbar { width: 3px; }
.winners-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

.winner-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px;
  background: rgba(255,255,255,0.025);
  border: 1px solid transparent;
  animation: fadeSlide 0.3s ease;
}
.winner-row.first {
  background: var(--accent-dim);
  border-color: var(--accent-border);
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.wr-rank { font-size: 11px; font-weight: 700; color: var(--text-muted); width: 20px; flex-shrink: 0; text-align: center; }
.winner-row.first .wr-rank { color: var(--accent); font-size: 13px; }
.wr-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.wr-name { flex: 1; font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.winner-row.first .wr-name { color: var(--accent); font-weight: 600; }
.wr-time { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }

.list-empty {
  padding: 20px 0; text-align: center;
  font-size: 12px; color: var(--text-muted); line-height: 1.8;
}
.list-empty-icon { font-size: 1.6rem; display: block; margin-bottom: 6px; opacity: 0.35; }

.btn-ghost {
  background: none; border: none; cursor: pointer; font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--text-muted); padding: 0; transition: color 0.2s;
}
.btn-ghost:hover { color: #ef4444; }

/* Items list */
.item-list { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; padding-right: 2px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
.item-list::-webkit-scrollbar { width: 3px; }
.item-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

.item-row {
  display: flex; align-items: center; gap: 8px;
  animation: fadeSlide 0.22s ease;
}
.color-pip {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  cursor: pointer; transition: transform 0.15s;
  border: 1.5px solid rgba(255,255,255,0.15);
}
.color-pip:hover { transform: scale(1.4); }
.item-input {
  flex: 1; background: rgba(255,255,255,0.04);
  border: 1px solid var(--border); border-radius: 7px;
  padding: 6px 10px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
  outline: none; transition: border-color 0.2s; min-width: 0;
}
.item-input:focus { border-color: rgba(251,191,36,0.4); }
.item-input::placeholder { color: rgba(255,255,255,0.2); }
.del-btn {
  width: 24px; height: 24px; border-radius: 6px; border: none;
  background: rgba(255,255,255,0.04); color: var(--text-muted);
  font-size: 12px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.del-btn:hover { background: rgba(239,68,68,0.15); color: #ef4444; }

/* Add row */
.add-row { display: flex; gap: 7px; margin-top: 10px; }
.add-input {
  flex: 1; background: rgba(255,255,255,0.04);
  border: 1px solid var(--border); border-radius: 7px;
  padding: 8px 10px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 13px;
  outline: none; transition: border-color 0.2s;
}
.add-input:focus { border-color: rgba(251,191,36,0.4); }
.add-input::placeholder { color: rgba(255,255,255,0.2); }
.btn-add {
  background: var(--accent-dim); border: 1px solid var(--accent-border);
  border-radius: 7px; color: var(--accent); font-size: 16px; font-weight: 400;
  width: 36px; height: 36px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s; flex-shrink: 0;
}
.btn-add:hover { background: rgba(251,191,36,0.25); }

/* Tool row */
.tool-row { display: flex; gap: 6px; margin-top: 8px; }
.btn-tool {
  flex: 1; background: rgba(255,255,255,0.03);
  border: 1px solid var(--border); border-radius: 7px;
  color: var(--text-muted); font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
  padding: 7px 4px; cursor: pointer;
  text-transform: uppercase; transition: all 0.2s;
}
.btn-tool:hover { border-color: var(--border2); color: var(--text); background: rgba(255,255,255,0.06); }

/* Settings */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.setting { display: flex; flex-direction: column; gap: 4px; }
.setting label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); }
.setting select {
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 13px; padding: 7px 10px; outline: none; cursor: pointer;
  transition: border-color 0.2s;
}
.setting select:focus { border-color: rgba(251,191,36,0.4); }

/* ── MODAL ──────────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,0.85);
  backdrop-filter: blur(8px); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px; padding: 36px 40px; text-align: center;
  max-width: 380px; width: 90%;
  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  transform: translateY(16px) scale(0.97);
  transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
}
.overlay.show .modal { transform: translateY(0) scale(1); }

.modal-emoji { font-size: 3rem; display: block; margin-bottom: 12px; }
.modal-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;
}
.modal-name {
  font-size: clamp(1.3rem,4vw,1.9rem); font-weight: 700;
  color: var(--accent); line-height: 1.2; margin-bottom: 6px;
  word-break: break-word;
}
.modal-sub {
  font-size: 12px; color: var(--text-muted); margin-bottom: 28px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.modal-sub::before { content: ''; display: inline-block; width: 14px; height: 1px; background: #ef4444; }
.modal-sub::after  { content: ''; display: inline-block; width: 14px; height: 1px; background: #ef4444; }
.modal-btns { display: flex; gap: 10px; justify-content: center; }
.btn-primary {
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 0.05em; padding: 11px 28px; border-radius: 8px; border: none;
  cursor: pointer; background: var(--accent); color: #111827;
  transition: background 0.2s, transform 0.15s;
}
.btn-primary:hover { background: #f59e0b; transform: translateY(-1px); }
.btn-secondary {
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  padding: 11px 22px; border-radius: 8px;
  border: 1px solid var(--border2); background: none;
  color: var(--text-muted); cursor: pointer; transition: all 0.2s;
}
.btn-secondary:hover { background: rgba(255,255,255,0.05); color: var(--text); }

/* ── CONFETTI ───────────────────────────────────────────────── */
#cf-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; }

/* ── FOOTER ────────────────────────────────────────────────── */
.footer {
  border-top: 1px solid var(--border);
  padding: 14px 5%;
  font-size: 11px; color: var(--text-muted);
  text-align: center; letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ── RESPONSIVE ─────────────────────────────────────────────── */
@media (max-width: 820px) {
  .main { grid-template-columns: 1fr; padding: 24px 5%; gap: 24px; }
  .header-stat { display: none; }
}
@media (max-width: 480px) { .modal { padding: 28px 22px; } }

/* ── SHAKE ──────────────────────────────────────────────────── */
@keyframes shake {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}
}
</style>
</head>
<body>

<canvas id="cf-canvas"></canvas>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <a class="back-link" href="games.html">← Arcade</a>
    <div class="header-title">Spin the <span>Wheel</span></div>
    <div class="header-meta">
      <div class="header-stat">
        <span>Spins</span>
        <strong id="spin-count">0</strong>
      </div>
      <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- WHEEL -->
    <div class="wheel-col">
      <div class="wheel-stage" id="wheel-stage">
        <div class="wheel-ring"></div>
        <div class="wheel-ring-inner"></div>
        <canvas id="wheel-canvas" width="440" height="440"></canvas>
        <div class="pointer"></div>
        <div class="hub"></div>
      </div>

      <!-- All prizes claimed -->
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">🏆</div>
        <h3>All Prizes Claimed</h3>
        <p>Every item has been won.<br>Add new items or reset to defaults.</p>
        <button class="btn-reset" onclick="resetToDefaults()">↺  Reset Wheel</button>
      </div>

      <button class="btn-spin" id="spin-btn" onclick="spinWheel(event)">
        Spin
        <small class="key-hint">Space bar</small>
      </button>
    </div>

    <!-- SIDE -->
    <div class="side-col">

      <!-- Winners -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            Winners
            <span class="badge" id="winners-count">0</span>
          </div>
          <button class="btn-ghost" onclick="clearWinners()">Clear</button>
        </div>
        <div class="winners-list" id="winners-list">
          <div class="list-empty"><span class="list-empty-icon">🎯</span>No winners yet</div>
        </div>
      </div>

      <!-- Items -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">
            Items
            <span class="badge" id="seg-count">0</span>
          </div>
        </div>
        <div class="item-list" id="item-list"></div>
        <div class="add-row">
          <input class="add-input" id="add-input" type="text" placeholder="Add an item…" maxlength="30"
            onkeydown="if(event.key==='Enter') addItem()">
          <button class="btn-add" onclick="addItem()">+</button>
        </div>
        <div class="tool-row">
          <button class="btn-tool" onclick="randomColors()">Recolor</button>
          <button class="btn-tool" onclick="shuffle()">Shuffle</button>
          <button class="btn-tool" onclick="clearItems()">Clear</button>
        </div>
      </div>

      <!-- Settings -->
      <div class="card">
        <div class="card-header" style="margin-bottom:12px">
          <div class="card-title">Settings</div>
        </div>
        <div class="settings-grid">
          <div class="setting">
            <label>Speed</label>
            <select id="speed-sel">
              <option value="3">Slow</option>
              <option value="6" selected>Normal</option>
              <option value="10">Fast</option>
            </select>
          </div>
          <div class="setting">
            <label>Duration</label>
            <select id="dur-sel">
              <option value="3">3 s</option>
              <option value="5" selected>5 s</option>
              <option value="8">8 s</option>
            </select>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="footer">Space = spin &nbsp;·&nbsp; Won prizes are removed automatically</div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <span class="modal-emoji" id="m-emoji">🎉</span>
    <div class="modal-label">Winner</div>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-sub">Removed from wheel</div>
    <div class="modal-btns">
      <button class="btn-primary" onclick="spinAgain()">Spin Again</button>
      <button class="btn-secondary" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   DEFAULTS & STATE
═══════════════════════════════════════════════ */
const DEFAULTS = [
  {label:'Item 1', color:'#3b82f6'}, {label:'Item 2', color:'#8b5cf6'},
  {label:'Item 3', color:'#ec4899'}, {label:'Item 4', color:'#f59e0b'},
  {label:'Item 5', color:'#10b981'}, {label:'Item 6', color:'#06b6d4'},
  {label:'Item 7', color:'#f97316'}, {label:'Item 8', color:'#6366f1'},
];
// Muted but still distinct palette — fits the dark minimalist theme
const PALETTE = [
  '#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981',
  '#06b6d4','#f97316','#6366f1','#14b8a6','#ef4444',
  '#a78bfa','#34d399','#fb923c','#60a5fa','#f472b6',
];
const EMOJIS = ['🎉','🏆','🥇','✨','🎊','💎','🌟','🎯','🔥','👑'];

let segs = [], winners = [], rot = 0, spinning = false, spins = 0, muted = false;
let sa = 0, ta = 0, t0 = null, tickLast = -1, animId = null;
const AC = (window.AudioContext||window.webkitAudioContext) ? new (window.AudioContext||window.webkitAudioContext)() : null;

/* ═══════════════════════════════════════════════
   AUDIO
═══════════════════════════════════════════════ */
function tone(f,type='sine',d=0.07,v=0.2){
  if(!AC||muted)return;
  try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=type;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}catch(e){}
}
function playTick(){ tone(700+Math.random()*200,'square',0.04,0.08); }
function playWin(){ tone(523,'sine',0.1,0.25); setTimeout(()=>tone(659,'sine',0.1,0.25),110); setTimeout(()=>tone(784,'sine',0.18,0.3),220); }
function playStart(){ tone(220,'triangle',0.12,0.18); }
function toggleMute(){ muted=!muted; document.getElementById('mute-btn').textContent=muted?'🔇':'🔊'; }

/* ═══════════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════════ */
function save(){ try{ localStorage.setItem('stw4',JSON.stringify({segs,winners,spins})); }catch(e){} }
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('stw4'));
    if(d){ if(Array.isArray(d.segs)&&d.segs.length) segs=d.segs; if(Array.isArray(d.winners)) winners=d.winners; if(typeof d.spins==='number') spins=d.spins; return true; }
  }catch(e){}
  return false;
}

/* ═══════════════════════════════════════════════
   COLOR HELPERS
═══════════════════════════════════════════════ */
function h2r(h){ const m=h.replace('#','').match(/.{2}/g); return m?[parseInt(m[0],16),parseInt(m[1],16),parseInt(m[2],16)]:[0,0,0]; }
function r2h(r,g,b){ return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v|0)).toString(16).padStart(2,'0')).join(''); }
function lighten(h,a){ const[r,g,b]=h2r(h); return r2h(r+a,g+a,b+a); }
function darken(h,a){  const[r,g,b]=h2r(h); return r2h(r-a,g-a,b-a); }
function rnd(){ return PALETTE[Math.floor(Math.random()*PALETTE.length)]; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ═══════════════════════════════════════════════
   DRAW WHEEL
═══════════════════════════════════════════════ */
const cv = document.getElementById('wheel-canvas');
const cx = cv.getContext('2d');

window.drawWheel = function(r=rot){
  const sz=cv.width, hx=sz/2, hy=sz/2, R=sz/2-6;
  cx.clearRect(0,0,sz,sz);
  const n=segs.length; if(!n)return;
  const sl=(Math.PI*2)/n;

  segs.forEach((s,i)=>{
    const a0=r+i*sl-Math.PI/2, a1=a0+sl, mid=(a0+a1)/2;
    // Subtle radial gradient — lighter center, natural edge
    const gx2=hx+R*0.4*Math.cos(mid), gy2=hy+R*0.4*Math.sin(mid);
    const gr=cx.createRadialGradient(gx2,gy2,0,hx,hy,R);
    gr.addColorStop(0,lighten(s.color,28));
    gr.addColorStop(0.7,s.color);
    gr.addColorStop(1,darken(s.color,30));
    cx.beginPath(); cx.moveTo(hx,hy); cx.arc(hx,hy,R,a0,a1); cx.closePath();
    cx.fillStyle=gr; cx.fill();
    // Thin divider
    cx.strokeStyle='rgba(0,0,0,0.35)'; cx.lineWidth=1.5; cx.stroke();

    // Label
    cx.save(); cx.translate(hx,hy); cx.rotate(mid);
    cx.textAlign='right'; cx.textBaseline='middle';
    const fs=Math.min(15,Math.max(9,200/n));
    cx.font=`600 ${fs}px 'Inter',sans-serif`;
    cx.shadowColor='rgba(0,0,0,0.6)'; cx.shadowBlur=4; cx.fillStyle='#fff';
    let lb=s.label; const mw=R*0.7;
    while(cx.measureText(lb).width>mw&&lb.length>2) lb=lb.slice(0,-1);
    if(lb!==s.label) lb=lb.slice(0,-1)+'…';
    cx.fillText(lb, R*0.62, 0);
    cx.shadowBlur=0; cx.restore();
  });

  // Outer rim
  cx.beginPath(); cx.arc(hx,hy,R,0,Math.PI*2);
  cx.strokeStyle='rgba(0,0,0,0.5)'; cx.lineWidth=3; cx.stroke();
  // Hub
  cx.beginPath(); cx.arc(hx,hy,22,0,Math.PI*2);
  cx.fillStyle='#111827'; cx.fill();
  cx.strokeStyle='rgba(255,255,255,0.08)'; cx.lineWidth=1.5; cx.stroke();
};

/* ═══════════════════════════════════════════════
   GET WINNER INDEX
═══════════════════════════════════════════════ */
window.getWinner = function(){
  const n=segs.length, sl=(Math.PI*2)/n;
  let p=((rot%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  p=(Math.PI*2-p+Math.PI*2)%(Math.PI*2);
  p=(p+Math.PI/2+Math.PI*2)%(Math.PI*2);
  return Math.floor(p/sl)%n;
};

/* ═══════════════════════════════════════════════
   SEGMENT MANAGEMENT
═══════════════════════════════════════════════ */
function renderItems(){
  const list=document.getElementById('item-list');
  list.innerHTML='';
  segs.forEach((s,i)=>{
    const row=document.createElement('div'); row.className='item-row';
    const pip=document.createElement('div'); pip.className='color-pip';
    pip.style.background=s.color; pip.title='Click to recolor';
    pip.onclick=()=>{ s.color=rnd(); pip.style.background=s.color; drawWheel(); save(); };
    const inp=document.createElement('input'); inp.className='item-input';
    inp.type='text'; inp.value=s.label; inp.maxLength=30;
    inp.oninput=()=>{ s.label=inp.value; drawWheel(); save(); };
    const del=document.createElement('button'); del.className='del-btn'; del.textContent='×';
    del.onclick=()=>{ if(segs.length<=2){jiggle(del);return;} segs.splice(i,1); renderItems(); save(); };
    row.append(pip,inp,del); list.appendChild(row);
  });
  drawWheel(); syncEmpty();
  document.getElementById('seg-count').textContent=segs.length;
}

function addItem(){
  const el=document.getElementById('add-input'), v=el.value.trim();
  if(!v){jiggle(el);return;} if(segs.length>=20)return;
  segs.push({label:v,color:rnd()}); el.value='';
  renderItems(); save();
  document.getElementById('item-list').scrollTop=99999;
}
function randomColors(){ segs.forEach(s=>s.color=rnd()); renderItems(); save(); }
function shuffle(){
  for(let i=segs.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [segs[i],segs[j]]=[segs[j],segs[i]]; }
  renderItems(); save();
}
function clearItems(){
  if(!confirm('Clear all items?'))return;
  segs=DEFAULTS.map(d=>({...d})); renderItems(); save();
}
function resetToDefaults(){ segs=DEFAULTS.map(d=>({...d})); renderItems(); save(); }
function syncEmpty(){
  const empty=segs.length===0;
  document.getElementById('empty-state').classList.toggle('show',empty);
  document.getElementById('spin-btn').disabled=empty;
}
function jiggle(el){ el.style.animation='none'; el.offsetHeight; el.style.animation='shake 0.35s ease'; setTimeout(()=>el.style.animation='',350); }

/* ═══════════════════════════════════════════════
   WINNERS
═══════════════════════════════════════════════ */
function recordWinner(label,color){
  const now=new Date();
  winners.unshift({label,color,ts:now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  save(); renderWinners();
}
function renderWinners(){
  const list=document.getElementById('winners-list');
  document.getElementById('winners-count').textContent=winners.length;
  if(!winners.length){ list.innerHTML='<div class="list-empty"><span class="list-empty-icon">🎯</span>No winners yet</div>'; return; }
  list.innerHTML='';
  winners.forEach((w,i)=>{
    const row=document.createElement('div'); row.className='winner-row'+(i===0?' first':'');
    row.innerHTML=`
      <span class="wr-rank">${i===0?'★':'#'+(i+1)}</span>
      <span class="wr-dot" style="background:${w.color}"></span>
      <span class="wr-name">${esc(w.label)}</span>
      <span class="wr-time">${w.ts}</span>`;
    list.appendChild(row);
  });
}
function clearWinners(){ if(!winners.length)return; if(!confirm('Clear all winner history?'))return; winners=[]; save(); renderWinners(); }

/* ═══════════════════════════════════════════════
   SPIN
═══════════════════════════════════════════════ */
function ease(t){ return 1-Math.pow(1-t,4); }

function spinWheel(e){
  if(spinning||segs.length<2)return;
  if(e&&e.clientX){ doRipple(e,document.getElementById('spin-btn')); }
  if(AC&&AC.state==='suspended') AC.resume();
  playStart();
  spinning=true; document.getElementById('spin-btn').disabled=true;
  document.getElementById('spin-count').textContent=++spins;

  const n=segs.length, sl=(Math.PI*2)/n;
  const tSeg=Math.floor(Math.random()*n);
  const jitter=(Math.random()*0.8-0.4)*sl;
  const full=parseInt(document.getElementById('speed-sel').value)+Math.random()*2;
  const dp=tSeg*sl+sl/2+jitter;
  const dr=(Math.PI/2-dp+Math.PI*2)%(Math.PI*2);
  const cn=((rot%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  let delta=dr-cn; if(delta<0)delta+=Math.PI*2;
  delta+=full*Math.PI*2;
  sa=rot; ta=rot+delta; t0=null; tickLast=-1;
  const dur=parseFloat(document.getElementById('dur-sel').value)*1000;

  function frame(ts){
    if(!t0)t0=ts;
    const t=Math.min((ts-t0)/dur,1);
    rot=sa+(ta-sa)*ease(t);
    const cs=getWinner(); if(cs!==tickLast){if(t<0.85)playTick();tickLast=cs;}
    drawWheel(rot);
    if(t<1){ animId=requestAnimationFrame(frame); }
    else{ rot=ta; drawWheel(rot); spinning=false; document.getElementById('spin-btn').disabled=false; onEnd(); }
  }
  animId=requestAnimationFrame(frame);
}

function onEnd(){
  const idx=getWinner(), won=segs[idx];
  playWin();
  boom(won.color);
  recordWinner(won.label,won.color);
  setTimeout(()=>{ segs.splice(idx,1); renderItems(); save(); }, 600);
  showModal(won.label);
}

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
function showModal(name){
  document.getElementById('m-name').textContent=name;
  document.getElementById('m-emoji').textContent=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  document.getElementById('overlay').classList.add('show');
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.remove('show');
  stopBoom();
}
function spinAgain(){
  document.getElementById('overlay').classList.remove('show');
  stopBoom();
  if(segs.length>=2) setTimeout(()=>spinWheel(null),300);
}

/* ═══════════════════════════════════════════════
   CONFETTI — subtle, minimal
═══════════════════════════════════════════════ */
const cfc=document.getElementById('cf-canvas'),cfx=cfc.getContext('2d');
let pts=[], cfId=null;
function boom(base){
  cfc.width=innerWidth; cfc.height=innerHeight;
  pts=Array.from({length:90},()=>({
    x:Math.random()*cfc.width, y:-10-Math.random()*60,
    w:5+Math.random()*6, h:3+Math.random()*5,
    color:Math.random()<0.45?base:PALETTE[Math.floor(Math.random()*PALETTE.length)],
    vx:-1.5+Math.random()*3, vy:2.5+Math.random()*4,
    rot:Math.random()*360, rv:-2+Math.random()*4, op:0.9
  }));
  cfLoop();
}
function cfLoop(){
  cfx.clearRect(0,0,cfc.width,cfc.height); let alive=false;
  pts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.rv; p.vy+=0.07; p.op-=0.005;
    if(p.y<cfc.height+20&&p.op>0) alive=true;
    cfx.save(); cfx.translate(p.x,p.y); cfx.rotate(p.rot*Math.PI/180);
    cfx.globalAlpha=Math.max(0,p.op); cfx.fillStyle=p.color;
    cfx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cfx.restore();
  });
  if(alive) cfId=requestAnimationFrame(cfLoop); else cfx.clearRect(0,0,cfc.width,cfc.height);
}
function stopBoom(){ if(cfId){cancelAnimationFrame(cfId);cfId=null;} cfx.clearRect(0,0,cfc.width,cfc.height); }

/* ═══════════════════════════════════════════════
   RIPPLE
═══════════════════════════════════════════════ */
function doRipple(e,btn){
  const r=btn.getBoundingClientRect(),sp=document.createElement('span');
  sp.className='ripple-span'; const sz=Math.max(r.width,r.height);
  sp.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-r.left-sz/2}px;top:${e.clientY-r.top-sz/2}px`;
  btn.appendChild(sp); sp.addEventListener('animationend',()=>sp.remove());
}

/* ═══════════════════════════════════════════════
   RESIZE + KEYBOARD
═══════════════════════════════════════════════ */
function onResize(){
  const s=Math.min(440,innerWidth-48); cv.width=s; cv.height=s;
  drawWheel(rot);
  cfc.width=innerWidth; cfc.height=innerHeight;
}
window.addEventListener('resize',onResize);
document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&e.target.tagName!=='INPUT'){e.preventDefault();spinWheel(null);}
  if(e.code==='Escape'){document.getElementById('overlay').classList.remove('show');stopBoom();}
});
cv.addEventListener('click',e=>{
  if(!document.getElementById('overlay').classList.contains('show')&&!spinning) spinWheel(e);
});

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
(function(){
  if(!load()) segs=DEFAULTS.map(d=>({...d}));
  document.getElementById('spin-count').textContent=spins;
  onResize(); renderItems(); renderWinners(); drawWheel();
})();
</script>
